<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/axios@1.1.2/dist/axios.min.js"></script>
    <title>My weather app</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form id="user-search-request">
          <input
            type="search"
            placeholder="Enter a city..."
            required
            class="search-input"
            id="city-given"
          />
          <input type="submit" value="Search" class="search-button" />
        </form>
      </header>
      <main>
        <div class="current-weather">
          <div>
            <h1 id="city"></h1>
            <p class="current-details">
              <span id="currentTime"></span>, <span id="description">moderate rain</span>
              <br />
              Humidity: <strong id="humidity-value"></strong>, Wind: <strong id="speed-value"></strong>
            </p>
          </div>
          <div class="current-temperature-container">
            <span class="current-temperature-icon">️☀️</span>
            <span id="current-temperature-value"></span>
            <span class="current-temperature-unit">°C</span>
          </div>
        </div>
      </main>
      <footer>
        <p>
          This project was coded by
          <a href="https://github.com/justnini98-source" target="_blank">Vanessa</a> and is
          <a href="https://github.com/justnini98-source/Week-7-Project-Setup" target="_blank"> on GitHub</a> and
          <a href="https://fluffy-genie-a43f18.netlify.app" target="_blank">hosted on Netlify</a>
        </p>
      </footer>
    </div>
    <script src="weatherRequest.js"></script>
  </body>
</html>
